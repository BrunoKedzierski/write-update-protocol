spring.application.name=node
# ===================================================================
# 1. TOŻSAMOŚĆ I KONFIGURACJA SIECIOWA BIEŻĄCEGO WĘZŁA (WĘZEŁ 3)
# ===================================================================
# Unikalny identyfikator tego węzła w klastrze P2P (zgodnie z planem: Node 3 = Java)
node.id=3

# Adres IP przypisany do maszyny z systemem Windows (zmień na rzeczywiste IP w sieci lokalnej)
node.ip=192.168.1.7

# Port, na którym wbudowany serwer Tomcat będzie nasłuchiwał żądań HTTP REST
server.port=8083

# Port UDP, na którym nasłuchuje nasz serwer (UdpConfig) i na który rówieśnicy będą słać Heartbeaty
udp.port=4444


# ===================================================================
# 2. ADRESY SIECIOWE RÓWIEŚNIKÓW (PEERS) DLA REPLIKACJI I ALGORYTMU BULLY
# ===================================================================
# Węzeł 1: Środowisko Linux / C# .NET
peers.node1.ip=192.168.1.40
peers.node1.url=http://192.168.1.40:8081

# Węzeł 2: Środowisko macOS / Python FastAPI
peers.node2.ip=192.168.1.7
peers.node2.url=http://192.168.1.7:8082


# ===================================================================
# 3. ZARZĄDZANIE LOGAMI (LOGGING)
# ===================================================================
# Formatowanie logów dla lepszej czytelności w konsoli (dodanie znacznika czasu i nazwy wątku)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Poziom logowania dla pakietu aplikacji (DEBUG pozwoli Ci widzieć pakiety UDP i transakcje sieciowe w konsoli)
logging.level.com.example.node=DEBUG

# Wyciszenie domyślnych, bardzo szczegółowych logów samego frameworka Spring
logging.level.org.springframework=INFO
logging.level.org.springframework.integration=WARN


# ===================================================================
# 4. DODATKOWE USTAWIENIA SPRING BOOT
# ===================================================================
# Wyłączenie banera startowego Spring Boot w celu zachowania czytelności konsoli podczas testów
spring.main.banner-mode=off

# Zezwolenie na nadpisywanie definicji Beanów (przydatne przy testach integracyjnych i mockowaniu)
spring.main.allow-bean-definition-overriding=true